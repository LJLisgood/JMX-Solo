server:
  port: 8081

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/jmeter_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

cloudflare:
  r2:
    endpoint: ${CLOUDFLARE_R2_ENDPOINT:https://your-account-id.r2.cloudflarestorage.com}
    access-key: ${CLOUDFLARE_R2_ACCESS_KEY:your_access_key}
    secret-key: ${CLOUDFLARE_R2_SECRET_KEY:your_secret_key}
    bucket: ${CLOUDFLARE_R2_BUCKET:your_bucket_name}
